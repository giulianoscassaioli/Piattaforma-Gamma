server:
  port: 8090

spring:
  application:
    name: gateway-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/gamma

gateway:
  pec-service-url: ${PEC_SERVICE_URL:http://localhost:8081}
  firma-service-url: ${FIRMA_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.gamma: DEBUG
